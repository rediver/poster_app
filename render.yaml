services:
  - type: web
    name: poster-backend
    runtime: python
    autoDeploy: true
    healthCheckPath: /healthz
    buildCommand: |
      pip install -r flask/requirements.txt
    startCommand: |
      gunicorn server.app:app -w 2 -k gthread -b 0.0.0.0:$PORT --access-logfile - --error-logfile - --log-level info
    envVars:
      - key: PUBLIC_BASE_URL
        value: "https://poster-backend-94h1.onrender.com"
      - key: FRONTEND_ORIGIN
        value: "https://poster-frontend.onrender.com"
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: STRAVA_CLIENT_ID
        sync: false
      - key: STRAVA_CLIENT_SECRET
        sync: false
      - key: MAPBOX_ACCESS_TOKEN
        sync: false
      - key: POSTER_OUT_W
        value: "4800"
      - key: POSTER_OUT_H
        value: "3600"
      - key: POSTER_STORAGE_MODE
        value: s3
      - key: AWS_REGION
        value: eu-central-1
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET
        value: your-bucket-name
      - key: S3_PUBLIC_READ
        value: "true"
      - key: S3_KEY_PREFIX
        value: posters/
      # Jeśli korzystasz z CDN (CloudFront), ustaw publiczną bazę URL dla plików
      - key: S3_PUBLIC_BASE_URL
        value: ""

  - type: web
    name: poster-frontend
    runtime: static
    autoDeploy: true
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: redirect
        source: /strava/auth
        destination: https://poster-backend-94h1.onrender.com/strava/auth
      - type: redirect
        source: /strava/callback
        destination: https://poster-backend-94h1.onrender.com/strava/callback
      - type: rewrite
        source: /api/(.*)
        destination: https://poster-backend-94h1.onrender.com/api/$1
    envVars:
      # Frontend will call backend directly (CORS enabled on backend)
      - key: VITE_BACKEND_URL
        value: "https://poster-backend-94h1.onrender.com"
